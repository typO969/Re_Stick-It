name: CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build-and-test:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore StickIt.Tests/StickIt.Tests.csproj

      - name: Build
        run: dotnet build StickIt/StickIt.csproj --configuration Release --no-restore

      - name: Test
        run: dotnet test StickIt.Tests/StickIt.Tests.csproj --configuration Release --no-build --verbosity minimal
